<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0c22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1e2f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feFlood flood-color="#000000" flood-opacity="0.3"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGradient)" stroke="#fbbf24" stroke-width="8"/>
  <circle cx="256" cy="256" r="225" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="2"/>

  <!-- Tech Circuit Accents -->
  <path d="M100,256 A156,156 0 0,1 412,256" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2" stroke-dasharray="10,10"/>
  
  <!-- Main Text "SLV" -->
  <text x="50%" y="48%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="140" fill="white" letter-spacing="4" filter="url(#dropShadow)">SLV</text>
  
  <!-- "Service Center" Text Curve -->
  <path id="textCurve" d="M 110,280 A 130,130 0 0,0 402,280" fill="none"/>
  <text width="512">
    <textPath xlink:href="#textCurve" startOffset="50%" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="28" fill="url(#goldGradient)" letter-spacing="1.5" text-transform="uppercase">
      Service Center
    </textPath>
  </text>

  <!-- TV Icon / Repair Symbol at Bottom -->
  <g transform="translate(226, 350) scale(1.2)">
     <rect x="0" y="0" width="60" height="40" rx="4" fill="none" stroke="white" stroke-width="3"/>
     <path d="M30,40 L30,48 M15,48 L45,48" stroke="white" stroke-width="3" stroke-linecap="round"/>
     <!-- Screen glint -->
     <path d="M10,10 L25,10 L15,30" fill="rgba(255,255,255,0.2)"/>
     <!-- Bolt symbol -->
     <path d="M50,-10 L45,0 M55,-10 L45,0" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  </g>

</svg>
